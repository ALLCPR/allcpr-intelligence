<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect x="0" y="0" width="1000" height="560" rx="16" fill="#ffffff"/>
  <text x="500" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1d1d1f">ALLCPR Site Intelligence — architecture</text>
  <text x="500" y="60" text-anchor="middle" font-size="13" fill="#6e6e73">All heavy work is offline → saved JSON. The web app is a thin read-only layer; no paid APIs on page load.</text>

  <!-- Column headers -->
  <text x="130" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#0a84ff">1 · DATA SOURCES</text>
  <text x="385" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#6e6e73">2 · OFFLINE BUILD</text>
  <text x="640" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#1a7f43">3 · JSON ARTIFACTS</text>
  <text x="885" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#0071e3">4 · SERVE</text>

  <!-- Col 1: sources -->
  <g font-size="12.5" fill="#1d1d1f">
    <rect x="30" y="112" width="200" height="34" rx="8" fill="#eaf3ff" stroke="#bfdcff"/><text x="130" y="134" text-anchor="middle">Census ACS + Gazetteer</text>
    <rect x="30" y="154" width="200" height="34" rx="8" fill="#eaf3ff" stroke="#bfdcff"/><text x="130" y="176" text-anchor="middle">Enrollware class history</text>
    <rect x="30" y="196" width="200" height="34" rx="8" fill="#eaf3ff" stroke="#bfdcff"/><text x="130" y="218" text-anchor="middle">HIFLD · NPI · IPEDS · OSM</text>
    <rect x="30" y="238" width="200" height="34" rx="8" fill="#f3ecfb" stroke="#d9c6f2"/><text x="130" y="260" text-anchor="middle">Google Places (opt-in)</text>
    <rect x="30" y="280" width="200" height="34" rx="8" fill="#eaf3ff" stroke="#bfdcff"/><text x="130" y="302" text-anchor="middle">Manual commercial CSV</text>
  </g>

  <!-- Col 2: scripts -->
  <g font-size="12" fill="#1d1d1f">
    <rect x="285" y="112" width="200" height="32" rx="8" fill="#f4f4f6" stroke="#dddde2"/><text x="385" y="133" text-anchor="middle">build_national_demand.py</text>
    <rect x="285" y="150" width="200" height="32" rx="8" fill="#f4f4f6" stroke="#dddde2"/><text x="385" y="171" text-anchor="middle">generate_html_report.py</text>
    <rect x="285" y="188" width="200" height="32" rx="8" fill="#f4f4f6" stroke="#dddde2"/><text x="385" y="209" text-anchor="middle">enrich_top_zips.py</text>
    <rect x="285" y="226" width="200" height="32" rx="8" fill="#f4f4f6" stroke="#dddde2"/><text x="385" y="247" text-anchor="middle">qa_national_demand.py</text>
    <rect x="285" y="264" width="200" height="32" rx="8" fill="#f4f4f6" stroke="#dddde2"/><text x="385" y="285" text-anchor="middle">backtest_modeled_vs_hist.py</text>
  </g>

  <!-- Col 3: artifacts -->
  <g font-size="12" fill="#1d1d1f">
    <rect x="540" y="112" width="200" height="32" rx="8" fill="#e8f7ee" stroke="#bfe6cd"/><text x="640" y="133" text-anchor="middle">national_demand.json</text>
    <rect x="540" y="150" width="200" height="32" rx="8" fill="#e8f7ee" stroke="#bfe6cd"/><text x="640" y="171" text-anchor="middle">national_demand_enriched.json</text>
    <rect x="540" y="188" width="200" height="32" rx="8" fill="#e8f7ee" stroke="#bfe6cd"/><text x="640" y="209" text-anchor="middle">latest_report.json</text>
    <rect x="540" y="226" width="200" height="32" rx="8" fill="#e8f7ee" stroke="#bfe6cd"/><text x="640" y="247" text-anchor="middle">model_backtest.json</text>
    <rect x="540" y="264" width="200" height="32" rx="8" fill="#e8f7ee" stroke="#bfe6cd"/><text x="640" y="285" text-anchor="middle">national_demand_qa.json</text>
  </g>

  <!-- Col 4: serve -->
  <g font-size="12.5" fill="#1d1d1f">
    <rect x="795" y="130" width="180" height="78" rx="10" fill="#eaf1ff" stroke="#b9d3ff"/>
    <text x="885" y="158" text-anchor="middle" font-weight="700">FastAPI (web_app.py)</text>
    <text x="885" y="178" text-anchor="middle" font-size="11" fill="#3a3a3c">/api/national-demand (cached)</text>
    <text x="885" y="194" text-anchor="middle" font-size="11" fill="#3a3a3c">/api/report · /qa · /backtest</text>
    <rect x="795" y="226" width="180" height="70" rx="10" fill="#ffffff" stroke="#0071e3" stroke-width="1.5"/>
    <text x="885" y="254" text-anchor="middle" font-weight="700">Dashboard</text>
    <text x="885" y="274" text-anchor="middle" font-size="11" fill="#3a3a3c">Leaflet map · ZIP search</text>
    <text x="885" y="289" text-anchor="middle" font-size="11" fill="#3a3a3c">heat · points · boundaries</text>
  </g>

  <!-- arrows between columns -->
  <g stroke="#9a9aa0" stroke-width="2" fill="none" marker-end="url(#ah)">
    <path d="M232 210 H283"/>
    <path d="M487 205 H538"/>
    <path d="M742 205 H793"/>
  </g>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#9a9aa0"/></marker>
  </defs>

  <!-- two-layer callout -->
  <rect x="30" y="350" width="940" height="180" rx="14" fill="#fafafa" stroke="#e3e3e6"/>
  <text x="50" y="378" font-size="14" font-weight="700" fill="#1d1d1f">Two deliberately separate layers — never blended</text>

  <rect x="50" y="392" width="445" height="120" rx="10" fill="#eaf3ff" stroke="#bfdcff"/>
  <text x="68" y="416" font-size="13.5" font-weight="700" fill="#0a84ff">Historical ALLCPR (real history)</text>
  <text x="68" y="440" font-size="12.5" fill="#1d1d1f">Real Enrollware class / student outcomes.</text>
  <text x="68" y="460" font-size="12.5" fill="#1d1d1f">Proven demand — evidence of where it already works.</text>
  <text x="68" y="488" font-size="11.5" fill="#6e6e73">Courses = AHA BLS / ARC BLS / ARC CPR student counts.</text>

  <rect x="505" y="392" width="445" height="120" rx="10" fill="#e8f7ee" stroke="#bfe6cd"/>
  <text x="523" y="416" font-size="13.5" font-weight="700" fill="#1a7f43">Modeled national (public-data estimate)</text>
  <text x="523" y="440" font-size="12.5" fill="#1d1d1f">~33,774 US ZIPs scored from Census ACS.</text>
  <text x="523" y="460" font-size="12.5" fill="#1d1d1f">Opportunity discovery — must be field-validated.</text>
  <text x="523" y="488" font-size="11.5" fill="#6e6e73">Course buttons = BLS-workforce vs community-CPR demand tilt.</text>
</svg>
